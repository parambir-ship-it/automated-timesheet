const STORAGE_KEY = "timesheet_generator_data";

function uid() { return "id_" + Math.random().toString(36).slice(2, 10); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function parseDate(s) { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); }
function fmtDate(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function excelSerial(d) { return 45292 + Math.round((d - new Date(2024,0,1)) / 86400000); }
function colL(c) { let s=""; c++; while(c>0){c--;s=String.fromCharCode(65+(c%26))+s;c=Math.floor(c/26);} return s; }
function seededRng(seed) { let s=Math.abs(seed)||1; return ()=>{s=(s*1664525+1013904223)&0x7fffffff;return s/0x7fffffff;}; }
function hashStr(s) { let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;} return h; }

function getActiveAllocs(emp, periodStart) {
  const pd = parseDate(periodStart);
  const r = {};
  for (const a of emp.allocations) {
    if (pd >= parseDate(a.start) && pd <= parseDate(a.end) && a.hours > 0) r[a.project] = a.hours;
  }
  return r;
}

function getWeekdays(weekStart, holidaySet) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    if (d.getDay() >= 1 && d.getDay() <= 5 && !holidaySet.has(fmtDate(d))) days.push(d);
  }
  return days;
}

function distHours(total, numDays, rng) {
  if (numDays === 0 || total === 0) return Array(numDays).fill(0);
  total = Math.round(total);
  if (total <= numDays) {
    const s = Array(numDays).fill(0);
    const idx = [...Array(numDays).keys()];
    for (let i = idx.length-1; i > 0; i--) { const j = Math.floor(rng()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
    for (let i = 0; i < total; i++) s[idx[i]] = 1;
    return s;
  }
  const base = Math.floor(total / numDays);
  const rem = total - base * numDays;
  const s = Array(numDays).fill(base);
  const idx = [...Array(numDays).keys()];
  for (let i = idx.length-1; i > 0; i--) { const j = Math.floor(rng()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  for (let i = 0; i < rem; i++) s[idx[i]]++;
  return s;
}

function generateDist(allocs, periodStart, holidaySet) {
  const ps = parseDate(periodStart);
  const seed = hashStr(periodStart + JSON.stringify(allocs));
  const rng = seededRng(seed);
  const w1Days = getWeekdays(ps, holidaySet);
  const w2Days = getWeekdays(addDays(ps, 7), holidaySet);
  const total = w1Days.length + w2Days.length;
  const w1 = {}, w2 = {};
  for (const [proj, bwHrs] of Object.entries(allocs)) {
    if (bwHrs <= 0 || total === 0) continue;
    const ideal1 = bwHrs * w1Days.length / total;
    let h1 = Math.round(ideal1 + (rng() - 0.5) * 2);
    h1 = Math.max(0, Math.min(bwHrs, h1));
    const h2 = Math.round(bwHrs) - h1;
    if (h1 > 0) { const d = distHours(h1, w1Days.length, rng); w1[proj] = {}; w1Days.forEach((day, i) => { if (d[i] > 0) w1[proj][fmtDate(day)] = d[i]; }); }
    if (h2 > 0) { const d = distHours(h2, w2Days.length, rng); w2[proj] = {}; w2Days.forEach((day, i) => { if (d[i] > 0) w2[proj][fmtDate(day)] = d[i]; }); }
  }
  return { w1, w2 };
}

function generateXLSX(emp, periodStart, holidaySet) {
  const allocs = getActiveAllocs(emp, periodStart);
  const { w1, w2 } = generateDist(allocs, periodStart, holidaySet);
  const ps = parseDate(periodStart);
  const wb = XLSX.utils.book_new();

  const ws = {};
  const set = (r, c, v, opts) => {
    const a = XLSX.utils.encode_cell({ r, c });
    if (opts?.f) { ws[a] = { t: "n", f: opts.f }; if (opts.z) ws[a].z = opts.z; }
    else if (v instanceof Date) ws[a] = { t: "n", v: excelSerial(v), z: opts?.z || "mm/dd/yyyy" };
    else if (typeof v === "number") { ws[a] = { t: "n", v }; if (opts?.z) ws[a].z = opts.z; }
    else if (v != null && v !== "") ws[a] = { t: "s", v: String(v) };
  };

  set(0,0,"Biweekly Timecard");
  set(2,0,"Employee"); set(2,1,emp.fullName); set(2,7,ORG.addr);
  set(3,1,"Exempt Employee"); set(3,7,ORG.city);
  set(4,0,"Hourly Pay Rate"); set(4,7,ORG.phone);
  set(5,0,"Pay Period Starting"); set(5,1,ps); set(5,7,ORG.fax);
  set(6,0,"Ending"); set(6,1,addDays(ps,13)); set(6,7,ORG.email);
  set(7,0,"Date Paid"); set(7,1,addDays(ps,20));

  ["PROJECT","Project Code","Sat","Sun","Mon","Tue","Wed","Thur","Fri","Total\nHrs"].forEach((h,i)=>set(9,i,h));

  set(10,0,"WEEK 1");
  for (let i=0;i<7;i++) set(10,2+i,addDays(ps,i),{z:"mm/dd"});

  PROJECTS.forEach((p,idx) => {
    const r = 11+idx;
    set(r,0,p.long); set(r,1,p.code);
    for (let i=0;i<7;i++) { const d=fmtDate(addDays(ps,i)); const hrs=(w1[p.short]||{})[d]; if(hrs>0) set(r,2+i,hrs); }
    set(r,9,null,{f:`SUM(C${r+1}:I${r+1})`});
  });

  LEAVE.forEach((l,idx) => { const r=24+idx; set(r,0,l); set(r,9,null,{f:`SUM(C${r+1}:I${r+1})`}); });

  set(28,0,"Total Hrs:");
  for (let c=2;c<=9;c++) set(28,c,null,{f:`SUM(${colL(c)}12:${colL(c)}28)`});

  set(29,0,"WEEK 2");
  for (let i=0;i<7;i++) set(29,2+i,addDays(ps,7+i),{z:"mm/dd"});

  PROJECTS.forEach((p,idx) => {
    const r=30+idx;
    set(r,0,p.long); set(r,1,p.code);
    for (let i=0;i<7;i++) { const d=fmtDate(addDays(ps,7+i)); const hrs=(w2[p.short]||{})[d]; if(hrs>0) set(r,2+i,hrs); }
    set(r,9,null,{f:`SUM(C${r+1}:I${r+1})`});
  });

  LEAVE.forEach((l,idx) => { const r=43+idx; set(r,0,l); set(r,9,null,{f:`SUM(C${r+1}:I${r+1})`}); });

  set(47,0,"Total Hrs:");
  for (let c=2;c<=9;c++) set(47,c,null,{f:`SUM(${colL(c)}31:${colL(c)}47)`});

  PROJECTS.forEach((p,idx) => {
    set(23+idx,15,p.long);
    set(23+idx,16,null,{f:`J${12+idx}+J${31+idx}`});
  });

  ws["!ref"]="A1:Q48";
  ws["!cols"]=[{wch:28},{wch:14},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:10},{},{},{},{},{},{wch:28},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,"Biweekly");

  const s1 = {};
  const set1 = (r,c,v,opts) => {
    const a = XLSX.utils.encode_cell({r,c});
    if (opts?.f) { s1[a]={t:"n",f:opts.f}; if(opts.z)s1[a].z=opts.z; }
    else if (typeof v==="number") { s1[a]={t:"n",v}; if(opts?.z)s1[a].z=opts.z; }
    else if (v!=null&&v!=="") s1[a]={t:"s",v:String(v)};
  };

  set1(0,1,"Hrs");
  ["Gross Hrly","HB Hrly","Ret Hrly","FICA Hrly"].forEach((l,i)=>set1(1,2+i,l));
  set1(2,2,Math.round(emp.annualSalary/26/emp.stdHours*10000)/10000,{z:"#,##0.00"});
  set1(2,3,emp.hbHrly,{z:"#,##0.00"});
  set1(2,4,emp.retHrly,{z:"#,##0.00"});
  set1(2,5,emp.ficaHrly,{z:"#,##0.00"});

  PROJECTS.forEach((p,idx) => {
    const r=3+idx;
    set1(r,0,p.long);
    set1(r,1,null,{f:`Biweekly!Q${24+idx}`});
    set1(r,2,null,{f:`$C$3*B${r+1}`,z:"#,##0.00"});
    set1(r,3,null,{f:`$D$3*B${r+1}`,z:"#,##0.00"});
    set1(r,4,null,{f:`$E$3*B${r+1}`,z:"#,##0.00"});
    set1(r,5,null,{f:`$F$3*B${r+1}`,z:"#,##0.00"});
  });

  const tr=3+PROJECTS.length;
  for (let c=2;c<=5;c++) set1(tr,c,null,{f:`SUM(${colL(c)}4:${colL(c)}${tr})`,z:"#,##0.00"});

  s1["!ref"]=`A1:F${tr+1}`;
  s1["!cols"]=[{wch:28},{wch:8},{wch:14},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,s1,"Sheet1");

  const dateStr = String(ps.getMonth()+1).padStart(2,"0")+String(ps.getDate()).padStart(2,"0")+ps.getFullYear();
  XLSX.writeFile(wb, `${dateStr}_${emp.initials}.xlsx`);
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function App() {
  const saved = loadSaved();
  const [employees, setEmployees] = useState(saved?.employees || DEFAULT_EMPLOYEES);
  const [holidays, setHolidays] = useState(saved?.holidays || DEFAULT_HOLIDAYS);
  const [tab, setTab] = useState("employees");
  const [selEmp, setSelEmp] = useState((saved?.employees || DEFAULT_EMPLOYEES)[0]?.id || null);
  const [periodStart, setPeriodStart] = useState("2024-07-20");
  const [genStatus, setGenStatus] = useState("");
  const [newHolDate, setNewHolDate] = useState("");
  const [newHolName, setNewHolName] = useState("");
  const inputRef = useRef();

  useEffect(() => { saveData({ employees, holidays }); }, [employees, holidays]);

  const emp = employees.find(e => e.id === selEmp);

  const updateEmp = (id, updates) => setEmployees(prev => prev.map(e => e.id === id ? { ...e, ...updates } : e));

  const addEmployee = () => {
    const e = { id: uid(), initials: "", fullName: "", annualSalary: 0, hbHrly: 0, retHrly: 0, ficaHrly: 0, stdHours: 80, allocations: [] };
    setEmployees(prev => [...prev, e]);
    setSelEmp(e.id);
  };

  const deleteEmployee = (id) => {
    setEmployees(prev => { const next = prev.filter(e => e.id !== id); if (selEmp === id) setSelEmp(next[0]?.id || null); return next; });
  };

  const addAlloc = () => {
    if (!emp) return;
    const a = { id: uid(), project: PROJECTS[0].short, hours: 0, start: "2024-01-01", end: "2024-12-31" };
    updateEmp(emp.id, { allocations: [...emp.allocations, a] });
  };

  const updateAlloc = (allocId, updates) => { if (!emp) return; updateEmp(emp.id, { allocations: emp.allocations.map(a => a.id === allocId ? { ...a, ...updates } : a) }); };
  const deleteAlloc = (allocId) => { if (!emp) return; updateEmp(emp.id, { allocations: emp.allocations.filter(a => a.id !== allocId) }); };

  const generateAll = () => {
    const hs = new Set(holidays.map(h => h.date));
    let count = 0;
    for (const e of employees) {
      if (Object.keys(getActiveAllocs(e, periodStart)).length === 0) continue;
      try { generateXLSX(e, periodStart, hs); count++; } catch(err) { console.error(err); }
    }
    setGenStatus(`Downloaded ${count} timecard(s)`);
    setTimeout(() => setGenStatus(""), 4000);
  };

  const generateOne = (e) => {
    const hs = new Set(holidays.map(h => h.date));
    generateXLSX(e, periodStart, hs);
    setGenStatus(`Downloaded ${e.initials}`);
    setTimeout(() => setGenStatus(""), 3000);
  };

  const addHoliday = () => {
    if (!newHolDate) return;
    setHolidays(prev => [...prev, { date: newHolDate, name: newHolName || "Holiday" }].sort((a,b) => a.date.localeCompare(b.date)));
    setNewHolDate(""); setNewHolName("");
  };

  const resetData = () => { if (confirm("Reset all data to defaults? This cannot be undone.")) { setEmployees(DEFAULT_EMPLOYEES); setHolidays(DEFAULT_HOLIDAYS); setSelEmp(DEFAULT_EMPLOYEES[0]?.id); } };

  const exportConfig = () => {
    const blob = new Blob([JSON.stringify({ employees, holidays }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "timesheet_config.json"; a.click(); URL.revokeObjectURL(url);
  };

  const importConfig = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { try { const d = JSON.parse(ev.target.result); if (d.employees) { setEmployees(d.employees); setSelEmp(d.employees[0]?.id); } if (d.holidays) setHolidays(d.holidays); } catch(err) { alert("Invalid config file"); } };
    reader.readAsText(file); e.target.value = "";
  };

  return (
    <div className="min-h-screen bg-stone-100">
      {/* Header */}
      <div className="bg-stone-800 text-white px-6 py-4 shadow-lg">
        <div className="max-w-6xl mx-auto flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 className="text-xl font-semibold" style={{letterSpacing:'-0.02em'}}>Timesheet Generator</h1>
            <p className="text-stone-400 text-xs mt-0.5">Automated biweekly timecard system</p>
          </div>
          <div className="flex gap-1">
            {[["employees","Employees"],["holidays","Holidays"],["generate","Generate"]].map(([key,label]) => (
              <button key={key} onClick={()=>setTab(key)} className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${tab===key?"bg-amber-500 text-stone-900":"text-stone-300 hover:bg-stone-700"}`}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      <div className="max-w-6xl mx-auto p-6">
        {/* EMPLOYEES TAB */}
        {tab === "employees" && (
          <div className="flex gap-6 flex-col md:flex-row">
            <div className="w-full md:w-64 flex-shrink-0">
              <div className="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                <div className="p-3 bg-stone-50 border-b border-stone-200 flex items-center justify-between">
                  <span className="text-sm font-semibold text-stone-700">Employees ({employees.length})</span>
                  <button onClick={addEmployee} className="w-7 h-7 rounded-lg bg-amber-500 text-white text-lg flex items-center justify-center hover:bg-amber-600 transition-colors" title="Add employee">+</button>
                </div>
                <div className="divide-y divide-stone-100 max-h-96 md:max-h-[70vh] overflow-y-auto">
                  {employees.map(e => (
                    <button key={e.id} onClick={()=>setSelEmp(e.id)} className={`w-full text-left px-4 py-3 flex items-center justify-between group transition-colors ${selEmp===e.id?"bg-amber-50 border-l-4 border-amber-500":"hover:bg-stone-50 border-l-4 border-transparent"}`}>
                      <div>
                        <div className="font-semibold text-sm text-stone-800">{e.initials || "—"}</div>
                        <div className="text-xs text-stone-500 truncate max-w-[140px]">{e.fullName || "New Employee"}</div>
                      </div>
                      <span onClick={(ev)=>{ev.stopPropagation();deleteEmployee(e.id);}} className="opacity-0 group-hover:opacity-100 text-stone-400 hover:text-red-500 text-xs transition-opacity cursor-pointer">✕</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="flex-1 min-w-0">
              {emp ? (
                <div className="space-y-5">
                  <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-5">
                    <h2 className="text-base font-semibold text-stone-800 mb-4">Employee Information</h2>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div><label className="block text-xs font-medium text-stone-500 mb-1">Initials</label>
                        <input value={emp.initials} onChange={e=>updateEmp(emp.id,{initials:e.target.value.toUpperCase()})} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" /></div>
                      <div><label className="block text-xs font-medium text-stone-500 mb-1">Full Name</label>
                        <input value={emp.fullName} onChange={e=>updateEmp(emp.id,{fullName:e.target.value})} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" /></div>
                      <div><label className="block text-xs font-medium text-stone-500 mb-1">Annual Salary ($)</label>
                        <input type="number" value={emp.annualSalary} onChange={e=>updateEmp(emp.id,{annualSalary:Number(e.target.value)})} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" /></div>
                      <div><label className="block text-xs font-medium text-stone-500 mb-1">Biweekly Hours</label>
                        <input type="number" value={emp.stdHours} onChange={e=>updateEmp(emp.id,{stdHours:Number(e.target.value)})} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" /></div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-4">
                      <div><label className="block text-xs font-medium text-stone-500 mb-1">HB Hrly Rate ($)</label>
                        <input type="number" step="0.01" value={emp.hbHrly} onChange={e=>updateEmp(emp.id,{hbHrly:Number(e.target.value)})} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" /></div>
                      <div><label className="block text-xs font-medium text-stone-500 mb-1">Retirement Hrly ($)</label>
                        <input type="number" step="0.01" value={emp.retHrly} onChange={e=>updateEmp(emp.id,{retHrly:Number(e.target.value)})} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" /></div>
                      <div><label className="block text-xs font-medium text-stone-500 mb-1">FICA Hrly ($)</label>
                        <input type="number" step="0.01" value={emp.ficaHrly} onChange={e=>updateEmp(emp.id,{ficaHrly:Number(e.target.value)})} className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" /></div>
                    </div>
                    <div className="mt-3 text-xs text-stone-400">Gross Hrly = ${emp.stdHours > 0 ? (emp.annualSalary/26/emp.stdHours).toFixed(2) : "—"}/hr</div>
                  </div>

                  <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-5">
                    <div className="flex items-center justify-between mb-4">
                      <h2 className="text-base font-semibold text-stone-800">Project Allocations</h2>
                      <button onClick={addAlloc} className="px-3 py-1.5 bg-amber-500 text-white rounded-lg text-xs font-medium hover:bg-amber-600 transition-colors">+ Add Allocation</button>
                    </div>
                    {emp.allocations.length === 0 ? (
                      <p className="text-sm text-stone-400 py-6 text-center">No allocations yet. Click "+ Add Allocation" to begin.</p>
                    ) : (
                      <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                          <thead><tr className="bg-stone-50">
                            <th className="text-left px-3 py-2 text-xs font-semibold text-stone-600">Project</th>
                            <th className="text-left px-3 py-2 text-xs font-semibold text-stone-600">Biweekly Hrs</th>
                            <th className="text-left px-3 py-2 text-xs font-semibold text-stone-600">Start Date</th>
                            <th className="text-left px-3 py-2 text-xs font-semibold text-stone-600">End Date</th>
                            <th className="w-8"></th>
                          </tr></thead>
                          <tbody className="divide-y divide-stone-100">
                            {emp.allocations.map(a => (
                              <tr key={a.id} className="hover:bg-stone-50">
                                <td className="px-3 py-2">
                                  <select value={a.project} onChange={e=>updateAlloc(a.id,{project:e.target.value})} className="border border-stone-300 rounded-md px-2 py-1 text-sm w-full focus:outline-none focus:ring-2 focus:ring-amber-400">
                                    {PROJECTS.map(p => <option key={p.short} value={p.short}>{p.short} — {p.long}</option>)}
                                  </select>
                                </td>
                                <td className="px-3 py-2"><input type="number" value={a.hours} onChange={e=>updateAlloc(a.id,{hours:Number(e.target.value)})} className="border border-stone-300 rounded-md px-2 py-1 text-sm w-20 focus:outline-none focus:ring-2 focus:ring-amber-400" /></td>
                                <td className="px-3 py-2"><input type="date" value={a.start} onChange={e=>updateAlloc(a.id,{start:e.target.value})} className="border border-stone-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400" /></td>
                                <td className="px-3 py-2"><input type="date" value={a.end} onChange={e=>updateAlloc(a.id,{end:e.target.value})} className="border border-stone-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400" /></td>
                                <td className="px-2"><button onClick={()=>deleteAlloc(a.id)} className="text-stone-400 hover:text-red-500 transition-colors">✕</button></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                </div>
              ) : (
                <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-12 text-center">
                  <p className="text-stone-400">Select an employee or click + to add one</p>
                </div>
              )}
            </div>
          </div>
        )}

        {/* HOLIDAYS TAB */}
        {tab === "holidays" && (
          <div className="max-w-2xl mx-auto">
            <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-5">
              <h2 className="text-base font-semibold text-stone-800 mb-4">Holiday Calendar</h2>
              <p className="text-xs text-stone-500 mb-4">Hours are not assigned on these dates — they are redistributed to the remaining weekdays in the same week.</p>
              <div className="flex gap-3 mb-5 flex-wrap">
                <input type="date" value={newHolDate} onChange={e=>setNewHolDate(e.target.value)} className="border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
                <input type="text" value={newHolName} onChange={e=>setNewHolName(e.target.value)} placeholder="Holiday name" className="flex-1 min-w-[150px] border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
                <button onClick={addHoliday} className="px-4 py-2 bg-amber-500 text-white rounded-lg text-sm font-medium hover:bg-amber-600 transition-colors">Add</button>
              </div>
              <div className="divide-y divide-stone-100 max-h-[55vh] overflow-y-auto">
                {holidays.map((h,i) => (
                  <div key={i} className="flex items-center justify-between py-2.5 px-2 group">
                    <div className="flex items-center gap-4"><span className="text-sm font-medium text-stone-700 w-28">{h.date}</span><span className="text-sm text-stone-500">{h.name}</span></div>
                    <button onClick={()=>setHolidays(prev=>prev.filter((_,j)=>j!==i))} className="opacity-0 group-hover:opacity-100 text-stone-400 hover:text-red-500 text-xs transition-opacity">✕</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* GENERATE TAB */}
        {tab === "generate" && (
          <div className="max-w-3xl mx-auto space-y-5">
            <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-5">
              <h2 className="text-base font-semibold text-stone-800 mb-4">Generate Timecards</h2>
              <div className="flex items-end gap-4 mb-6 flex-wrap">
                <div>
                  <label className="block text-xs font-medium text-stone-500 mb-1">Pay Period Start Date (Saturday)</label>
                  <input type="date" value={periodStart} onChange={e=>setPeriodStart(e.target.value)} className="border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
                </div>
                <button onClick={generateAll} className="px-6 py-2 bg-amber-500 text-white rounded-lg text-sm font-semibold hover:bg-amber-600 transition-colors shadow-sm">Download All Timecards</button>
              </div>
              {genStatus && <div className="mb-4 px-4 py-2 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm">{genStatus}</div>}

              <h3 className="text-sm font-semibold text-stone-600 mb-3">Employees &amp; Active Allocations for {periodStart}</h3>
              <div className="divide-y divide-stone-100">
                {employees.map(e => {
                  const a = getActiveAllocs(e, periodStart);
                  const total = Object.values(a).reduce((s,h)=>s+h,0);
                  const active = Object.keys(a).length > 0;
                  return (
                    <div key={e.id} className="py-3 flex items-center justify-between">
                      <div className="flex items-center gap-4">
                        <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-xs font-bold ${active?"bg-amber-100 text-amber-700":"bg-stone-100 text-stone-400"}`}>{e.initials||"?"}</div>
                        <div><div className="text-sm font-medium text-stone-800">{e.fullName||"—"}</div><div className="text-xs text-stone-500">{active?`${Object.keys(a).length} projects, ${total} hrs`:"No active allocations"}</div></div>
                      </div>
                      {active && <button onClick={()=>generateOne(e)} className="px-3 py-1.5 bg-stone-100 text-stone-600 rounded-lg text-xs font-medium hover:bg-stone-200 transition-colors">Download</button>}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-5">
              <h2 className="text-base font-semibold text-stone-800 mb-3">Data Management</h2>
              <p className="text-xs text-stone-500 mb-4">Your data is saved automatically in this browser. Use Export to back up, or Import to restore on another device.</p>
              <div className="flex gap-3 flex-wrap">
                <button onClick={exportConfig} className="px-4 py-2 bg-stone-100 text-stone-700 rounded-lg text-sm font-medium hover:bg-stone-200 transition-colors">Export Config</button>
                <button onClick={()=>inputRef.current?.click()} className="px-4 py-2 bg-stone-100 text-stone-700 rounded-lg text-sm font-medium hover:bg-stone-200 transition-colors">Import Config</button>
                <input ref={inputRef} type="file" accept=".json" onChange={importConfig} className="hidden" />
                <button onClick={resetData} className="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-medium hover:bg-red-100 transition-colors md:ml-auto">Reset to Defaults</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
